// ============ NAVEGACIÓN ============
function go(name){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const sec = document.getElementById(name);
  if(sec) sec.classList.add('active');
  const nav = document.querySelector('.nav-item[data-section="'+name+'"]');
  if(nav) nav.classList.add('active');
  State.section = name;
  if(name === 'clima') loadWeather();
}

});

// ============ ORB STATES ============
function setOrbState(state){
  const orbs = document.querySelectorAll('.orb');
  orbs.forEach(o => {
    o.classList.remove('listening','speaking');
    if(state === 'listening') o.classList.add('listening');
    if(state === 'speaking') o.classList.add('speaking');
  });
  const status = document.getElementById('helpieStatus');
  if(state === 'listening'){status.textContent = 'Escuchando...'; status.classList.add('active');}
  else if(state === 'speaking'){status.textContent = 'Hablando...'; status.classList.add('active');}
  else {status.textContent = 'En reposo'; status.classList.remove('active');}
}

// ============ VOLUMEN ============
function setVolume(val){

}

// ============ TTS - TEXT TO SPEECH ============
function speak(text){
  if(!State.ttsEnabled) return;
  if(!State.synth) {
    console.log('Speech synthesis not available');
    return;
  }
  
  // Cancel any ongoing speech
  State.synth.cancel();
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-CO';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;
  utterance.volume = State.volume;
  
  // Try to find a Spanish female voice
  const voices = State.synth.getVoices();
  const spanishVoices = voices.filter(v => v.lang.startsWith('es'));
  const femaleVoice = spanishVoices.find(v => /female|mujer|monica|paulina|helena|google spanish/i.test(v.name));
  
  if(femaleVoice) utterance.voice = femaleVoice;
  else if(spanishVoices.length > 0) utterance.voice = spanishVoices[0];
  
  utterance.onstart = () => {
    State.speaking = true;
    setOrbState('speaking');
  };
  
  utterance.onend = () => {
    State.speaking = false;
    setOrbState('idle');
  };
  
  utterance.onerror = (e) => {
    console.error('TTS Error:', e);
    State.speaking = false;
    setOrbState('idle');
  };
  
  State.synth.speak(utterance);
}

// ============ STT - SPEECH RECOGNITION ============
function initRecognition(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    showToast('Tu navegador no soporta reconocimiento de voz');
    return null;
  }
  
  const recognition = new SpeechRecognition();
  recognition.lang = 'es-CO';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  
  recognition.onstart = () => {
    State.listening = true;
    setOrbState('listening');
    document.getElementById('micBtn').classList.add('listening');
  };
  
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    addMsg('user', transcript);
    processCommand(transcript);
  };
  
  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    showToast('Error de voz: ' + event.error);
    State.listening = false;
    setOrbState('idle');
    document.getElementById('micBtn').classList.remove('listening');
  };
  
  recognition.onend = () => {
    State.listening = false;
    if(!State.speaking) setOrbState('idle');
    document.getElementById('micBtn').classList.remove('listening');
  };
  
  return recognition;
}

function toggleMic(){
  if(!State.recognition) State.recognition = initRecognition();
  if(!State.recognition){
    showToast('Reconocimiento de voz no disponible');
    return;
  }
  
  if(State.listening){
    State.recognition.stop();
  } else {
    try{
      State.recognition.start();
    } catch(e){
      console.error('Error starting recognition:', e);
      showToast('Error al iniciar micrófono');
    }
  }
}

// ============ PROCESAR COMANDOS ============
function processCommand(cmd){
  const c = cmd.toLowerCase();
  let response = '';
  let url = null;
  let wazeQuery = null;
  
  // SALUDOS
  if(c.includes('hola') || c.includes('buenos días') || c.includes('buenas tardes') || c.includes('buenas noches')){
    const hour = new Date().getHours();
    let greeting = 'Buenos días';
    if(hour >= 12 && hour < 19) greeting = 'Buenas tardes';
    else if(hour >= 19 || hour < 6) greeting = 'Buenas noches';
    
    response = `${greeting} Omar. ¿Cómo estás? ¿Qué tal pasó la noche? ¿Qué más te gustaría hacer hoy aparte de trabajar? ¿Quieres escuchar las últimas noticias de IA en el mundo, o iniciar el día con un podcast o una buena playlist?`;
  }
  
  // SPOTIFY PLAYLISTS
  else if(c.includes('spotify') || c.includes('pon') || c.includes('reproduce') || c.includes('música') || c.includes('musica')){
    let found = false;
    for(const [key, playlistUrl] of Object.entries(SpotifyPlaylists)){
      if(c.includes(key)){
        url = playlistUrl;
        response = `Abriendo playlist de ${key} en Spotify.`;
        found = true;
        break;
      }
    }
    if(!found){
      url = 'https://open.spotify.com';
      response = 'Abriendo Spotify. ¿Qué playlist quieres escuchar?';
    }
  }
  
  // MEDELLÍN PLACES - Búsqueda por categoría
  else if(c.includes('ir a') || c.includes('llévame a') || c.includes('vamos a') || c.includes('navegar a') || c.includes('abre')){
    let foundPlace = null;
    let foundCategory = null;
    
    // Buscar en todas las categorías
    for(const [category, places] of Object.entries(MedellinPlaces)){
      for(const place of places){
        if(c.includes(place.name.toLowerCase()) || c.includes(place.query.toLowerCase())){
          foundPlace = place;
          foundCategory = category;
          break;
        }
      }
      if(foundPlace) break;
    }
    
    if(foundPlace){
      wazeQuery = foundPlace.query;
      response = `Abriendo Waze con dirección a ${foundPlace.name}.`;
    }
    
    // Búsquedas genéricas por categoría

    }
    else if(c.includes('parque')){

// ============ GPS / DRIVE ============
function initGPS(){
  if(!navigator.geolocation){
    document.getElementById('driveStatus').textContent = 'No disponible';
    return;
  }
  
  navigator.geolocation.watchPosition(
    pos => {
      const c = pos.coords;
      State.geolocation = c;
      document.getElementById('driveSpeed').textContent = c.speed ? Math.round(c.speed * 3.6) : '0';
      document.getElementById('driveAlt').textContent = c.altitude ? Math.round(c.altitude) : '--';
      document.getElementById('driveLat').textContent = c.latitude.toFixed(4);
      document.getElementById('driveLon').textContent = c.longitude.toFixed(4);
      document.getElementById('driveStatus').textContent = 'Conectado';
      document.getElementById('bottomGps').textContent = '📍 GPS: Activo';
      document.getElementById('driveAddress').textContent = c.latitude.toFixed(4) + ', ' + c.longitude.toFixed(4);
    },
    err => {
      console.error('GPS Error:', err);
      document.getElementById('driveStatus').textContent = 'Error: ' + err.message;
      document.getElementById('bottomGps').textContent = '📍 GPS: Error';
    },
    {enableHighAccuracy: true, maximumAge: 1000, timeout: 10000}
  );
}

// ============ GPS / MAPAS ============
function openWaze(){
  if(State.geolocation){
    window.location.href = 'https://waze.com/ul?ll=' + State.geolocation.latitude + ',' + State.geolocation.longitude + '&from=ll';
  } else {
    window.location.href = 'https://waze.com/ul';
  }
}

function openGMaps(){
  if(State.geolocation){
    window.location.href = 'https://www.google.com/maps/@' + State.geolocation.latitude + ',' + State.geolocation.longitude + ',15z';
  } else {
    window.location.href = 'https://www.google.com/maps';
  }
}

function navWaze(){

  if(!d){showToast('Ingresa un destino'); return;}
  window.location.href = 'https://waze.com/ul?q=' + encodeURIComponent(d);

}

async function loadWeather(){

  try{

    if(State.geolocation){
      lat = State.geolocation.latitude;
      lon = State.geolocation.longitude;
    }
    
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=America%2FBogota');
    const data = await r.json();
    State.weather = data;
    
    const c = data.current;
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'🌧️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const icon = icons[c.weather_code] || '🌡️';
    const desc = {0:'Despejado',1:'Parcialmente nublado',2:'Nublado',3:'Muy nublado',45:'Niebla',61:'Lluvia',63:'Lluvia',65:'Lluvia fuerte',80:'Chubascos',95:'Tormenta'};
    
    hero.innerHTML = `
      <div class="weather-hero-icon">${icon}</div>
      <div class="weather-hero-info">
        <div class="weather-hero-temp">${Math.round(c.temperature_2m)}<small>°C</small></div>
        <div class="weather-hero-desc">${desc[c.weather_code]||'Variable'} · Sensación ${Math.round(c.apparent_temperature)}°</div>
        <div class="weather-hero-loc">📍 Medellín, Colombia</div>
      </div>
    `;
    
    document.getElementById('weatherDetails').innerHTML = `
      <div class="weather-detail"><div class="weather-detail-val">${Math.round(c.temperature_2m)}°</div><div class="weather-detail-lbl">Temperatura</div></div>
      <div class="weather-detail"><div class="weather-detail-val">${c.relative_humidity_2m}%</div><div class="weather-detail-lbl">Humedad</div></div>
      <div class="weather-detail"><div class="weather-detail-val">${c.wind_speed_10m}</div><div class="weather-detail-lbl">Viento km/h</div></div>
      <div class="weather-detail"><div class="weather-detail-val">${icon}</div><div class="weather-detail-lbl">Estado</div></div>
    `;
    
    document.getElementById('topWeather').textContent = Math.round(c.temperature_2m) + '°';
    
    const fg = document.getElementById('forecast');
    fg.innerHTML = '';
    for(let i=1; i<=5; i++){
      const d = new Date(data.daily.time[i]);
      const name = d.toLocaleDateString('es-CO',{weekday:'short'}).toUpperCase();
      const ic = icons[data.daily.weather_code[i]] || '🌡️';
      const mx = Math.round(data.daily.temperature_2m_max[i]);
      const mn = Math.round(data.daily.temperature_2m_min[i]);
      fg.innerHTML += `<div class="forecast-day"><div class="forecast-day-name">${name}</div><div class="forecast-day-icon">${ic}</div><div class="forecast-day-temp">${mx}° <small>${mn}°</small></div></div>`;
    }
  } catch(e){
    console.error('Weather error:', e);
    hero.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-sec)">Error cargando clima</div>';
  }
}

// ============ TOAST ============
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ SALUDO INICIAL ============
function greet(){
  const h = new Date().getHours();
  let g = 'Buenos días';
  if(h >= 12 && h < 19) g = 'Buenas tardes';
  else if(h >= 19 || h < 6) g = 'Buenas noches';
  
  const msg = `${g} Omar. ¿Cómo estás? ¿Qué tal pasó la noche? ¿Qué más te gustaría hacer hoy aparte de trabajar? ¿Quieres escuchar las últimas noticias de IA en el mundo, o iniciar el día con un podcast o una buena playlist?`;
  
  document.getElementById('greetText').innerHTML = `<strong>${g}</strong> Omar. Todos los sistemas están listos. ¿A dónde vamos hoy?`;
  
  // Esperar a que carguen las voces
  setTimeout(() => {
    speak(msg);
  }, 2000);
}

// ============ INIT ============
window.addEventListener('load', () => {
  // Cargar volumen guardado
  const savedVolume = localStorage.getItem('helpieVolume');
  if(savedVolume){
    State.volume = parseFloat(savedVolume);
    document.getElementById('volumeSlider').value = State.volume * 100;
  }
  
  // Precargar voces
  if(State.synth){
    State.synth.getVoices();
    State.synth.onvoiceschanged = () => State.synth.getVoices();
  }
  
  initGPS();
  loadWeather();
  greet();
  
  // Actualizar clima cada 30 min
  setInterval(loadWeather, 1800000);
});

// Exponer funciones globales
window.go = go;
window.toggleMic = toggleMic;
window.sendText = sendText;
window.openWaze = openWaze;
window.openGMaps = openGMaps;
window.navWaze = navWaze;
window.navGMaps = navGMaps;
window.setVolume = setVolume;
</script>
