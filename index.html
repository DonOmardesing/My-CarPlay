<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<title>DONOMAR AI DRIVE 3.0 | Powered by HELPIE</title>
<style>
:root{--bg:#0A0A0F;--primary:#0096FF;--primary-dark:#0066CC;--panel:#111827;--panel-light:#1F2937;--text:#FFFFFF;--text-sec:#94A3B8;--success:#00FF88;--warning:#FFA500;--error:#FF4444;--border:rgba(0,150,255,0.25);--glow:rgba(0,150,255,0.5)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);user-select:none}
body{display:flex;align-items:center;justify-content:center}
.app{width:100vw;height:100vh;display:grid;grid-template-columns:80px 1fr;grid-template-rows:60px 1fr 70px;background:var(--bg);position:relative;overflow:hidden}
.topbar{grid-column:1/3;display:flex;justify-content:space-between;align-items:center;padding:0 24px;background:rgba(17,24,39,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:10}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;display:flex;justify-content:center;align-items:center;font-size:20px;box-shadow:0 0 20px var(--glow)}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand-title{font-size:14px;font-weight:800;letter-spacing:2px;color:var(--primary);text-transform:uppercase}
.brand-sub{font-size:10px;color:var(--text-sec);letter-spacing:1.5px}
.top-status{display:flex;gap:12px;align-items:center}
.status-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 10px var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-pill.clock{color:var(--primary);font-variant-numeric:tabular-nums}
.status-pill.weather{color:var(--text)}
.sidebar{display:flex;flex-direction:column;padding:14px 0;gap:6px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;cursor:pointer;border-radius:10px;margin:0 8px;transition:all .25s;border:1px solid transparent}
.nav-item:hover{background:rgba(0,150,255,0.1);border-color:rgba(0,150,255,0.3)}
.nav-item.active{background:rgba(0,150,255,0.2);border-color:var(--primary);box-shadow:0 0 15px rgba(0,150,255,0.3)}
.nav-icon{font-size:22px;filter:grayscale(0.3);transition:all .25s}
.nav-item.active .nav-icon{filter:grayscale(0) drop-shadow(0 0 8px var(--glow))}
.nav-label{font-size:8px;color:var(--text-sec);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.nav-item.active .nav-label{color:var(--primary)}
.main{position:relative;overflow:hidden;background:var(--bg)}
.section{position:absolute;inset:0;padding:24px;overflow-y:auto;display:none;animation:fadeIn .4s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.section::-webkit-scrollbar{width:0}
.section-title{font-size:20px;font-weight:800;margin-bottom:18px;color:var(--text);text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:12px}
.section-title::before{content:"";width:4px;height:24px;background:linear-gradient(180deg,var(--primary),var(--primary-dark));border-radius:2px;box-shadow:0 0 10px var(--glow)}
.home{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:20px;height:100%;align-items:center}
.home-left,.home-right{display:flex;flex-direction:column;gap:14px}
.home-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.quick-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .25s}
.quick-card:hover{background:var(--panel-light);border-color:var(--primary);transform:translateX(4px)}
.quick-icon{width:42px;height:42px;border-radius:10px;background:rgba(0,150,255,0.15);display:flex;justify-content:center;align-items:center;font-size:22px}
.quick-info{flex:1}
.quick-title{font-size:13px;font-weight:700;margin-bottom:2px}
.quick-desc{font-size:10px;color:var(--text-sec);letter-spacing:1px}
.orb-container{position:relative;width:260px;height:260px;display:flex;justify-content:center;align-items:center}
.orb{position:relative;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#0096FF,#003366 60%,#001122);box-shadow:0 0 60px var(--glow),inset 0 0 40px rgba(0,150,255,0.4);animation:orbPulse 3s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:scale(1);box-shadow:0 0 60px var(--glow),inset 0 0 40px rgba(0,150,255,0.4)}50%{transform:scale(1.05);box-shadow:0 0 80px var(--glow),inset 0 0 50px rgba(0,150,255,0.6)}}
.orb::before,.orb::after{content:"";position:absolute;inset:-20px;border:2px solid rgba(0,150,255,0.3);border-radius:50%;border-top-color:var(--primary);animation:orbRotate 8s linear infinite}
.orb::after{inset:-40px;border-color:rgba(0,150,255,0.15);border-right-color:var(--primary);animation-duration:12s;animation-direction:reverse}
@keyframes orbRotate{to{transform:rotate(360deg)}}
.orb.listening{animation:orbListen 0.8s ease-in-out infinite;background:radial-gradient(circle at 30% 30%,#00FF88,#006633 60%,#002211);box-shadow:0 0 80px rgba(0,255,136,0.6),inset 0 0 50px rgba(0,255,136,0.5)}
@keyframes orbListen{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.orb.speaking{animation:orbSpeak 0.5s ease-in-out infinite;background:radial-gradient(circle at 30% 30%,#FFA500,#663300 60%,#221100);box-shadow:0 0 80px rgba(255,165,0,0.6),inset 0 0 50px rgba(255,165,0,0.5)}
@keyframes orbSpeak{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.greet-text{text-align:center;max-width:320px;min-height:60px;font-size:14px;color:var(--text-sec);line-height:1.6;padding:0 20px}
.greet-text strong{color:var(--primary)}
.mic-btn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border:3px solid rgba(255,255,255,0.1);display:flex;justify-content:center;align-items:center;font-size:34px;cursor:pointer;box-shadow:0 8px 30px var(--glow);transition:all .25s;position:fixed;bottom:100px;right:30px;z-index:1000}
.mic-btn:hover{transform:scale(1.08)}
.mic-btn:active{transform:scale(0.95)}
.mic-btn.listening{background:linear-gradient(135deg,var(--success),#009955);box-shadow:0 8px 40px rgba(0,255,136,0.6);animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 8px 40px rgba(0,255,136,0.6)}50%{box-shadow:0 8px 60px rgba(0,255,136,0.9)}}
.helpie-wrap{display:grid;grid-template-columns:1fr 1.5fr;gap:20px;height:calc(100% - 50px)}
.helpie-orb-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--panel);border-radius:16px;padding:20px;border:1px solid var(--border)}
.helpie-status{font-size:13px;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;font-weight:700;text-align:center}
.helpie-status.active{color:var(--success)}
.helpie-chat{background:var(--panel);border-radius:16px;padding:20px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:10px 4px;margin-bottom:14px}
.chat-messages::-webkit-scrollbar{width:0}
.msg{padding:12px 16px;border-radius:12px;max-width:80%;font-size:13px;line-height:1.5;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:rgba(0,150,255,0.15);border:1px solid rgba(0,150,255,0.3);align-self:flex-end;color:var(--text)}
.msg.bot{background:var(--panel-light);border:1px solid var(--border);align-self:flex-start}
.msg.bot strong{color:var(--primary)}
.chat-input-row{display:flex;gap:10px}
.chat-input{flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none}
.chat-input:focus{border-color:var(--primary)}
.chat-send{padding:12px 20px;background:var(--primary);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer}
.drive-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.drive-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;position:relative;overflow:hidden}
.drive-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-dark))}
.drive-icon{font-size:32px;margin-bottom:10px}
.drive-value{font-size:32px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;margin-bottom:4px}
.drive-label{font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:2px;font-weight:700}
.drive-status{margin-top:20px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.drive-status-label{font-size:11px;color:var(--text-sec);text-transform:uppercase;letter-spacing:2px}
.drive-status-value{font-size:13px;font-weight:700;color:var(--success);display:flex;align-items:center;gap:8px}
.gps-actions{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.gps-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:18px}
.gps-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,150,255,0.2)}
.gps-icon{width:60px;height:60px;border-radius:14px;display:flex;justify-content:center;align-items:center;font-size:30px}
.gps-icon.waze{background:linear-gradient(135deg,#33ccff,#0099cc)}
.gps-icon.gmaps{background:linear-gradient(135deg,#4285f4,#0d47a1)}
.gps-title{font-size:18px;font-weight:800;margin-bottom:4px}
.gps-desc{font-size:11px;color:var(--text-sec);letter-spacing:1px}
.gps-search{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.gps-input{width:100%;padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.gps-input:focus{border-color:var(--primary)}
.gps-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gps-btn{padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;letter-spacing:1px}
.gps-btn.waze{background:#33ccff;color:#000}
.gps-btn.gmaps{background:#4285f4;color:#fff}
.radio-hero{background:linear-gradient(135deg,rgba(0,150,255,0.15),rgba(0,100,200,0.05));border:1px solid var(--border);border-radius:16px;padding:30px;text-align:center;margin-bottom:20px}
.radio-hero-icon{font-size:64px;margin-bottom:14px;filter:drop-shadow(0 0 20px var(--glow))}
.radio-hero-title{font-size:22px;font-weight:800;margin-bottom:6px;color:var(--primary)}
.radio-hero-desc{font-size:13px;color:var(--text-sec);line-height:1.6}
.radio-links{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.radio-link{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;align-items:center;gap:16px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .25s}
.radio-link:hover{border-color:var(--primary);transform:translateY(-3px)}
.radio-link-icon{width:56px;height:56px;border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:28px}
.radio-link-icon.wa{background:#25D366}
.radio-link-icon.lt{background:linear-gradient(135deg,#443050,#6b4f7a)}
.radio-link-title{font-size:15px;font-weight:700;margin-bottom:3px}
.radio-link-desc{font-size:11px;color:var(--text-sec)}
.weather-hero{background:linear-gradient(135deg,rgba(0,100,200,0.2),rgba(0,50,150,0.08));border:1px solid var(--border);border-radius:16px;padding:28px;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;margin-bottom:16px}
.weather-hero-icon{font-size:72px;filter:drop-shadow(0 0 20px rgba(0,150,255,0.5))}
.weather-hero-temp{font-size:56px;font-weight:300;color:var(--text)}
.weather-hero-temp small{font-size:24px;color:var(--text-sec)}
.weather-hero-info{display:flex;flex-direction:column;gap:4px}
.weather-hero-desc{font-size:14px;color:var(--text-sec)}
.weather-hero-loc{font-size:11px;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase}
.weather-details{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.weather-detail{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.weather-detail-val{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:4px}
.weather-detail-lbl{font-size:9px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.forecast{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
.forecast-title{font-size:11px;color:var(--text-sec);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.forecast-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.forecast-day{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center}
.forecast-day-name{font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.forecast-day-icon{font-size:26px;margin-bottom:6px}
.forecast-day-temp{font-size:13px;font-weight:700;color:var(--text)}
.forecast-day-temp small{color:var(--text-sec);font-weight:400}
.links-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.link-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .25s}
.link-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,150,255,0.2)}
.link-icon{width:52px;height:52px;border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:26px;flex-shrink:0}
.link-icon.wa{background:#25D366}
.link-icon.lt{background:linear-gradient(135deg,#443050,#6b4f7a)}
.link-icon.yt{background:#FF0000}
.link-icon.ai{background:#10a37f}
.link-icon.sp{background:#1DB954}
.link-icon.ti{background:#0b2a96}
.link-title{font-size:14px;font-weight:700;margin-bottom:3px}
.link-desc{font-size:10px;color:var(--text-sec);letter-spacing:1px}
.settings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.setting-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;justify-content:space-between;align-items:center}
.setting-info{display:flex;align-items:center;gap:14px}
.setting-icon{width:42px;height:42px;border-radius:10px;background:rgba(0,150,255,0.15);display:flex;justify-content:center;align-items:center;font-size:20px}
.setting-name{font-size:13px;font-weight:700;margin-bottom:2px}
.setting-desc{font-size:10px;color:var(--text-sec)}
.toggle{width:48px;height:26px;background:var(--bg);border:1px solid var(--border);border-radius:13px;position:relative;cursor:pointer;transition:all .25s}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:var(--text-sec);border-radius:50%;transition:all .25s}
.toggle.on{background:var(--primary);border-color:var(--primary)}
.toggle.on::after{left:24px;background:#fff}
.volume-slider{width:100%;margin-top:10px}
.volume-slider input{width:100%;height:6px;border-radius:3px;background:var(--bg);outline:none;-webkit-appearance:none}
.volume-slider input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--primary);cursor:pointer}
.bottombar{grid-column:1/3;display:flex;justify-content:space-between;align-items:center;padding:0 24px;background:var(--panel);border-top:1px solid var(--border)}
.bottom-info{display:flex;gap:20px;align-items:center;font-size:11px;color:var(--text-sec)}
.bottom-info strong{color:var(--primary);font-weight:700}
.bottom-actions{display:flex;gap:10px}
.bottom-btn{padding:10px 18px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:11px;font-weight:70
